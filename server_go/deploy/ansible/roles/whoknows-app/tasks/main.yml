---
- name: Opret app-directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop:
    - "{{ app_dir }}"
    - "{{ app_dir }}/pgdata"
    - "{{ app_dir }}/logs"

- name: Placer docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Placer .env
  template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Opret active-fil (default blue)
  copy:
    content: "blue"
    dest: "{{ app_dir }}/active"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    force: false

- name: Login til GHCR
  shell: echo "{{ lookup('env', 'CR_PAT') }}" | docker login ghcr.io -u devops-team36 --password-stdin
  become: false
  args:
    executable: /bin/bash
  no_log: true

- name: Pull images fra GHCR
  shell: "cd {{ app_dir }} && sg docker -c 'docker compose pull'"
  become: false
  args:
    executable: /bin/bash

- name: Start postgres
  shell: "cd {{ app_dir }} && sg docker -c 'docker compose up -d postgres'"
  become: false
  args:
    executable: /bin/bash

- name: Start whoknows-blue
  shell: "cd {{ app_dir }} && sg docker -c 'docker compose up -d whoknows-blue'"
  become: false
  args:
    executable: /bin/bash

- name: Vent på at appen svarer
  wait_for:
    port: 8080
    host: 127.0.0.1
    delay: 5
    timeout: 90
