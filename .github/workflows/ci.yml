---
name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: whoknows_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://test:test@localhost:5432/whoknows_test?sslmode=disable
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.25.9'
          cache-dependency-path: server_go/go.sum

      - name: Build
        working-directory: server_go
        run: |
          go mod tidy
          go build -v ./...

      - name: Test
        working-directory: server_go
        run: go test -v ./...

  migration-test:
    name: Migration Sanity Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: whoknows_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.25.9'
          cache-dependency-path: server_go/go.sum

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Apply migrations against fresh DB
        working-directory: server_go
        run: goose -dir migrations postgres "postgres://test:test@localhost:5432/whoknows_test?sslmode=disable" up

  golangci-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.25.9'
          cache-dependency-path: server_go/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@0a35821d5c230e903fcfe077583637dea1b27b47
        with:
          version: v2.6.2
          working-directory: server_go

  gosec:
    name: Gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.25.9'
          cache-dependency-path: server_go/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
        working-directory: server_go

      - name: Run gosec
        run: gosec ./...
        working-directory: server_go

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.25.9'
          cache-dependency-path: server_go/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
        working-directory: server_go

      - name: Run govulncheck
        run: govulncheck ./...
        working-directory: server_go

  super-lint:
    name: Lint (Dockerfile, YAML, JSON, etc.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter/slim@02a1172d274f021e4c70f66e23f1085eadd1064b
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: dev
          STRIP_DEFAULT_WORKSPACE_FOR_REGEX: true
          FILTER_REGEX_EXCLUDE: ^server_go/templates/.*\.html$
          VALIDATE_GO: false
          VALIDATE_GO_MODULES: false
          VALIDATE_JSCPD: false
          VALIDATE_CSS: false
          VALIDATE_CSS_PRETTIER: false
          VALIDATE_HTML: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_CHECKOV: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
