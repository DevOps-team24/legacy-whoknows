name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.24'
          cache-dependency-path: server_go/go.sum

      - name: Build
        working-directory: server_go
        run: |
          go mod tidy
          go build -v ./...

      - name: Test
        working-directory: server_go
        run: go test -v ./...

  golangci-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.24'
          cache-dependency-path: server_go/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@23faadfdeb23a6f9e511beaba149bb123b5b145a
        with:
          version: latest
          working-directory: server_go

  gosec:
    name: Gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.24'
          cache-dependency-path: server_go/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
        working-directory: server_go

      - name: Run gosec
        run: gosec ./...
        working-directory: server_go

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.24'
          cache-dependency-path: server_go/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
        working-directory: server_go

      - name: Run govulncheck
        run: govulncheck ./...
        working-directory: server_go

  super-lint:
    name: Lint (Dockerfile, YAML, JSON, etc.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter/slim@02a1172d274f021e4c70f66e23f1085eadd1064b
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: dev
          VALIDATE_GO: false
          VALIDATE_GO_MODULES: false
          VALIDATE_JSCPD: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_CHECKOV: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}