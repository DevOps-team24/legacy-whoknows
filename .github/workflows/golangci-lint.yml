name: golangci-lint

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  golangci:
    name: Lint Go code with golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: server_go
