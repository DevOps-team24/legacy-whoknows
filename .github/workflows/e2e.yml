---
name: E2E Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: whoknows_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/whoknows_e2e?sslmode=disable
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491
        with:
          go-version: '1.25.9'
          cache-dependency-path: server_go/go.sum

      - name: Build server
        working-directory: server_go
        run: go build -o whoknows ./cmd/server

      - name: Start server
        working-directory: server_go
        run: |
          ./whoknows &
          sleep 2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server_go/e2e/package-lock.json

      - name: Install dependencies
        working-directory: server_go/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: server_go/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: server_go/e2e
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: playwright-report
          path: server_go/e2e/playwright-report/
          retention-days: 30
